<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Question ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    height: 100vh;
}

.container {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    width: 80%;
    max-width: 500px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    color: #ff4d6d;
}

p {
    font-size: 18px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    transition: left 0.2s ease, top 0.2s ease;
}

.yes {
    background: #28a745;
    color: white;
}

.no {
    background: #dc3545;
    color: white;
}

input, select {
    padding: 12px;
    width: 80%;
    max-width: 300px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    margin-top: 10px;
}

#message, #finalMessage {
    margin-top: 20px;
    font-size: 22px;
    color: #ff4d6d;
    font-weight: bold;
}

/* Floating Hearts */
.heart {
    position: absolute;
    color: rgba(255,0,80,0.7);
    animation: float 8s linear infinite;
    pointer-events: none;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-100px); opacity: 0; }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="container" id="page1">
    <h1>❤️ Will You Go On a Date With Me? ❤️</h1>

    <p>
        Every time we talk, my day gets a little brighter.
        I'd love to spend some special time with you.
    </p>

    <button class="yes" onclick="showDatePage()">Yes ❤️</button>
    <button class="no" id="noBtn">No 😜</button>

    <div id="message"></div>
</div>

<!-- PAGE 2 -->
<div class="container" id="page2" style="display:none;">
    <h1>❤️ Pick Our Date ❤️</h1>

    <p>Select a date for our special day</p>

    <input type="date" id="datePicker"><br><br>

    <select id="period">
        <option value="">Select Time Period</option>
        <option value="Evening 🌅">Evening 🌅</option>
        <option value="Night 🌙">Night 🌙</option>
    </select>

    <br><br>

    <input type="time" id="timePicker"><br><br>

    <button class="yes" onclick="confirmDate()">Confirm ❤️</button>
</div>

<!-- PAGE 3 -->
<div class="container" id="page3" style="display:none;">
    <h1>❤️ Yay! ❤️</h1>

    <div id="finalMessage"></div>

    <p style="margin-top:25px;font-size:24px;color:#ff4d6d;font-weight:bold;">
        I'll be there... Come on time 😘
    </p>
</div>

<script>

// PAGE SWITCH
function showDatePage() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
}

// CONFIRM DATE
function confirmDate() {
    const date = document.getElementById("datePicker").value;
    const period = document.getElementById("period").value;
    const time = document.getElementById("timePicker").value;

    if (!date || !period || !time) {
        alert("Please select date and time ❤️");
        return;
    }

    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "block";

    document.getElementById("finalMessage").innerHTML = `
        <p>❤️ Our Date Is Confirmed ❤️</p>
        <p>📅 <b>${date}</b></p>
        <p><b>${period}</b></p>
        <p>⏰ <b>${time}</b></p>
    `;
}

// MOVING NO BUTTON (never disappears)
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton() {
    const padding = 20;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
    noBtn.style.zIndex = "9999";
}

// FLOATING HEARTS
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 500);

</script>

</body>
</html>
